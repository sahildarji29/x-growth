<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@agent-voice-chat/react Demo</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #e0e0e0; min-height: 100vh; }
      #root { display: flex; flex-direction: column; align-items: center; padding: 32px 16px; gap: 32px; }
      h1 { font-size: 24px; font-weight: 600; }
      .demo-section { width: 100%; max-width: 960px; }
      .demo-section h2 { font-size: 18px; margin-bottom: 16px; color: #8888aa; }
      .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      @media (max-width: 768px) { .demo-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
